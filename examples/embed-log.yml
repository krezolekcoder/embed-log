version: 1

server:
  host: 127.0.0.1
  ws_port: 8080
  ws_ui: frontend/index.html
  app_name: embed-log
  open_browser: false
  verbose: false
  # optional: include CI/job id in session and log naming
  # job_id: GH-12345

logs:
  dir: logs/

# Optional global UART baudrate for uart sources without explicit per-source baudrate
baudrate: 115200

sources:
  - name: DUT_UART
    type: uart
    port: /dev/ttyUSB0
    inject_port: 5001

  - name: SENSOR_A
    type: udp
    port: 6000
    inject_port: 5002
    # optional: mirror raw RX lines to one or more read-only TCP forward ports
    # forward_ports: [7001]

tabs:
  - label: Devices
    panes: [DUT_UART, SENSOR_A]
